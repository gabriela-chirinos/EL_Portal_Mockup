name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # This tells npm exactly where your package.json is
        run: npm install
        working-directory: ./el-portal-site

      - name: Build Astro
        run: npm run build
        working-directory: ./el-portal-site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the dist folder inside your subfolder
          path: ./el-portal-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
